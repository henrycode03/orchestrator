services:
  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - "6333:6333"
    volumes:
      - qdrant_data:/qdrant/storage

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  orchestrator:
    build: .
    command: >
      sh -c "uvicorn app.main:app --host 0.0.0.0 --port 8080 2>&1 | tee /app/logs/backend.log"
    user: root
    ports:
      - "8080:8080"
    env_file: .env
    environment:
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/1
      - QDRANT_URL=http://qdrant:6333
      - DATABASE_URL=sqlite:////app/orchestrator.db
      - WORKSPACE_ROOT=/app/projects
      - RUNTIME_PROFILE=${RUNTIME_PROFILE:-medium}
      - AGENT_SECONDARY_BACKEND=${AGENT_SECONDARY_BACKEND:-}
      - OLLAMA_AGENT_MODEL=${OLLAMA_AGENT_MODEL:-}
      - OLLAMA_NUM_CTX=${OLLAMA_NUM_CTX:-4096}
      - OLLAMA_PLANNING_TIMEOUT_SECONDS=${OLLAMA_PLANNING_TIMEOUT_SECONDS:-0}
    depends_on:
      - redis
      - qdrant
    volumes:
      - ./orchestrator.db:/app/orchestrator.db
      - ./data:/app/data
      - ./logs:/app/logs
      - ./checkpoints:/app/checkpoints
      - ./knowledge:/app/knowledge
      - type: bind
        source: ${WORKSPACE_ROOT:?Set WORKSPACE_ROOT to a WSL2 ext4 path, for example /home/yourname/projects}
        target: /app/projects
    extra_hosts:
      - "host.docker.internal:host-gateway"

  celery_worker:
    build: .
    user: root
    command: >
      sh -c "chmod -R 777 /app/checkpoints /app/logs && (celery -A app.celery_app worker --loglevel=info --concurrency=1 2>&1 | tee /app/logs/worker.log)"
    env_file: .env
    environment:
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/1
      - QDRANT_URL=http://qdrant:6333
      - DATABASE_URL=sqlite:////app/orchestrator.db
      - WORKSPACE_ROOT=/app/projects
      - RUNTIME_PROFILE=${RUNTIME_PROFILE:-medium}
      - AGENT_SECONDARY_BACKEND=${AGENT_SECONDARY_BACKEND:-}
      - OLLAMA_AGENT_MODEL=${OLLAMA_AGENT_MODEL:-}
      - OLLAMA_NUM_CTX=${OLLAMA_NUM_CTX:-4096}
      - OLLAMA_PLANNING_TIMEOUT_SECONDS=${OLLAMA_PLANNING_TIMEOUT_SECONDS:-0}
    depends_on:
      - redis
      - qdrant
    volumes:
      - ./orchestrator.db:/app/orchestrator.db
      - ./data:/app/data
      - ./logs:/app/logs
      - ./checkpoints:/app/checkpoints
      - ./knowledge:/app/knowledge
      - type: bind
        source: ${WORKSPACE_ROOT:?Set WORKSPACE_ROOT to a WSL2 ext4 path, for example /home/yourname/projects}
        target: /app/projects
    extra_hosts:
      - "host.docker.internal:host-gateway"

volumes:
  qdrant_data:
