[pytest]
testpaths = app/tests
pythonpath = .
addopts = --strict-markers
markers =
    unit: fast pure logic tests with no service/database boundary
    integration: database, API, service, or worker-boundary tests
    semantic: replay, policy simulation, event journal, and decision timeline contract tests
    live: requires running backend, worker, Redis, OpenClaw, or other local services
    slow: long-running tests that should stay out of the fast tier
